server:
  port: ${SERVER_PORT:8081}

spring:
  # ── Profile ──────────────────────────────────────────────────────────────
  # Dùng profile "local" để nạp application-local.yaml (không commit lên git)
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    # url: ${DB_URL:jdbc:mysql://localhost:3306/motorbike_shop?useSSL=false}
    url: ${DB_URL:jdbc:mysql://localhost:3306/motorbike_shop?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8}
    username: ${DB_USERNAME:CHANGE_ME}
    password: ${DB_PASSWORD:CHANGE_ME}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    generate-ddl: true
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        connection:
          characterEncoding: UTF-8
          useUnicode: true

  jackson:
    serialization:
      fail-on-empty-beans: false
    time-zone: Asia/Ho_Chi_Minh

  security:
    user:
      name: ${SECURITY_USER_NAME:CHANGE_ME}
      password: ${SECURITY_USER_PASSWORD:CHANGE_ME}
      roles: ADMIN

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:CHANGE_ME}
    password: ${MAIL_PASSWORD:CHANGE_ME}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}

app:
  jwt-secret: ${JWT_SECRET:CHANGE_ME}
  jwt-expiration-milliseconds: ${JWT_EXPIRATION_MS:7200000}
  # Đường dẫn thư mục chứa ảnh tĩnh (tương đối từ nơi chạy BE, hoặc dùng đường dẫn tuyệt đối)
  image-path: ${IMAGE_PATH:../MotoShop_ADMIN/src/static/images/}
